{% extends "base.html" %}
{% load static %}
<title>{% block title %}Login{% endblock title %}</title>

{% block content %}
<h3>Admin Dashboard</h3>
<div class="row mt-4">
    <div class="col-md-6">
        <div class="card-body shadow-sm border-0 d-flex justify-content-between align-items-center">
            <div>
                <div class="text-muted">Users</div>
                <div class ="h3">{{total_user}}</div>
            </div>
            <div>
                <i class="fa-solid fa-users fa-2xl text-success"></i>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card-body d-flex shadow-sm border-0 d-flex justify-content-between align-items-center">
            <div>
                <div class="text-muted">Predictions</div>
                <div class ="h3">{{total_prediction}}</div>
            </div>
            <div>
                <i class="fa-solid fa-seedling fa-2xl text-success"></i>
            </div>
        </div>
    </div>
</div>
<div class="row g-4">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-body" style = "height:350px;">
                <h5 class = "mb-3">Top Recommended Crops</h5>
                <canvas id = "cropBar"></canvas>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-body" style= "height:350px;">
                <h5 class="mb-3">Prediction(7days)</h5>
                <canvas id = "dailyLine"></canvas>
            </div>
        </div>
    </div>
</div>

<script src = "https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
<script>
    const crop_label = {{crop_labels | safe}};
    const crop_count = {{crop_counts | safe}};
    const day_label = {{day_labels | safe}};
    const day_count = {{day_counts | safe}};

    function makeOrReplaceChart(canvasId, config){
        const existing = Chart.getChart(canvasId);
        if(existing) existing.destroy();
        const canvas = document.getElementById(canvasId);
        if(!canvas) return null;
        return new Chart(canvas, config);
    }
    makeOrReplaceChart('cropBar',{
        type:'bar',
        data : {
            labels : crop_label,
            datasets : [{label:'Count' , data : crop_count}] 
        },
        options : {
            responsive : true,
            maintainAspectRatio : false,
        }
    });
    makeOrReplaceChart('dailyLine',{
        type:'line',
        data : {
            labels : day_label,
            datasets : [{label:'Prediction' , data : day_count, fill : true}] 
        },
        options : {
            responsive : true,
            maintainAspectRatio : false,
        }
    });
</script>
{% endblock content %}
