{% extends "base.html" %}
{% load static %}
<title>{% block title %}Prediction{% endblock title %}</title>
{% block content %}
    <div class="row g-4">
        <div class="col-lg-7">
            <div class="card shadow-sm border-0 p-4">
                <h2 class = "text-center mb-3"><i class="fas fa-key"></i>Change Password</h2>
                <form action = "" method="POST" id="profile-form">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-md-12">
                            <label for="form-label">Current Password</label>
                            <input type="password" name="current_password" id="currpwd" class="form-control" placeholder = "******" required>
                        </div>
                        <div class="col-md-12">
                            <label for="form-label">New Password<span class ="text-muted small">(min 6 characters) </span> </label>
                            <input type="password" name="password" id="pwd1" class="form-control" placeholder = "******" required>
                        </div>
                        <div class="col-md-12">
                            <label for="form-label">Confirm Password</label>
                            <input type="password" name="confirm" id="pwd2" class="form-control" placeholder = "******" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-danger mt-3 w-100" id="save-btn">Change Password</button>
                </form>
            </div>
        </div>
    </div>
{% endblock content %}
